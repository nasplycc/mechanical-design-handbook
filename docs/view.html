<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 机械设计手册</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6fa;color:#2d3436;max-width:960px;margin:0 auto;padding:20px}
h1{font-size:22px;display:flex;align-items:center;gap:8px}
h1 a{font-size:13px;color:#0984e3;text-decoration:none;font-weight:400}
.breadcrumb{font-size:13px;color:#636e72;margin-bottom:16px;padding:8px 12px;background:#fff;border-radius:8px;border:1px solid #eee}
.content{background:#fff;border-radius:12px;padding:20px 24px;border:1px solid #eee;line-height:1.8;overflow-x:auto}
.content h2{font-size:18px;color:#0984e3;border-bottom:1px solid #eee;padding-bottom:6px;margin:20px 0 12px}
.content h3{font-size:16px;color:#2d3436;margin:16px 0 8px}
.content h4{font-size:15px;color:#555;margin:12px 0 6px}
.content table{border-collapse:collapse;margin:10px 0;font-size:13px;width:100%}
.content td,.content th{border:1px solid #dfe6e9;padding:6px 10px;text-align:center}
.content th{background:#e8f4fd;font-weight:500}
.content code{background:#f0f0f0;padding:1px 5px;border-radius:3px;font-size:13px}
.content pre{background:#f5f5f5;padding:12px;border-radius:8px;overflow-x:auto;font-size:13px}
.content blockquote{border-left:3px solid #0984e3;padding:8px 16px;margin:10px 0;background:#f8fbff;color:#636e72;font-size:13px}
.content a{color:#0984e3}
#ld{text-align:center;padding:60px;color:#636e72}
@media(prefers-color-scheme:dark){body{background:#1a1a2e;color:#e0e0e0}.content,.breadcrumb{background:#16213e;border-color:#2a2a4a}.content th{background:#1a2a3e}.content pre{background:#12122e}.content blockquote{background:#12122e}}
</style>
</head>
<body>

<h1>📚 <span id="title">机械设计手册</span> <a id="back" href="./">← 返回搜索</a></h1>
<div class="breadcrumb" id="breadcrumb">加载中...</div>
<div id="ld">📖 加载文档中...</div>
<div class="content" id="content"></div>

<script>
const isLocal = window.location.host !== "nasplycc.github.io";
const RAW_BASE = isLocal ? "/raw/" : "https://raw.githubusercontent.com/nasplycc/mechanical-design-handbook/main/机械设计知识库/";
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if (!file) {
  document.getElementById("ld").textContent = "❌ 未指定文件参数 ?file=...";
  const srchQ = params.get("q") || "";
  document.getElementById("back").href = srchQ ? "./?q=" + encodeURIComponent(srchQ) : ".";
  if (!srchQ) document.getElementById("back").textContent = "← 返回";
} else {
  document.getElementById("breadcrumb").innerHTML = "📁 " + file.replace(/\//g, " → ");
  document.getElementById("title").textContent = file.split("/").pop().replace(".md", "");
  
  fetch(RAW_BASE + file)
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(md => {
      const html = marked.parse(md);
      document.getElementById("ld").style.display = "none";
      document.getElementById("content").innerHTML = html;
      
      // 为所有heading添加GitHub兼容的ID，使目录链接可点击跳转
      document.querySelectorAll('.content h1, .content h2, .content h3, .content h4').forEach(h => {
        const id = h.textContent.toLowerCase()
          .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '');
        h.id = id;
      });
      
      // KaTeX 渲染
      try {
        if (window.renderMathInElement) {
          renderMathInElement(document.getElementById("content"), {
            delimiters: [
              {left: "$$", right: "$$", display: true},
              {left: "$", right: "$", display: false},
              {left: "\\\\(", right: "\\\\)", display: false},
              {left: "\\\\[", right: "\\\\]", display: true}
            ]
          });
        }
      } catch(e) {}
    })
    .catch(e => {
      document.getElementById("ld").textContent = "❌ 加载失败: " + e.message;
    });
}
</script>
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" 
  style="display:none;position:fixed;bottom:30px;right:30px;width:44px;height:44px;
  background:#0984e3;color:#fff;border:none;border-radius:50%;font-size:22px;
  cursor:pointer;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,0.2);
  transition:opacity 0.3s;opacity:0.85">⬆</button>
<script>
window.addEventListener('scroll',function(){
  document.getElementById('topBtn').style.display=window.scrollY>300?'block':'none';
});
</script>
</body>
</html>
