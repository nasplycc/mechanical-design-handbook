<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 机械设计手册 知识库</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6fa;color:#2d3436;max-width:960px;margin:0 auto;padding:20px}
h1{font-size:24px;display:flex;align-items:center;gap:8px}
h1 span{font-size:14px;color:#636e72;font-weight:400}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header .links a{font-size:13px;color:#0984e3;text-decoration:none;margin-left:12px}
.header .links a:hover{text-decoration:underline}
.s{display:flex;gap:8px;margin:12px 0}
.s input{flex:1;padding:12px 16px;border:2px solid #dfe6e9;border-radius:10px;font-size:15px;outline:none}
.s input:focus{border-color:#0984e3}
.s button{padding:12px 24px;background:#0984e3;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:500}
.s button:active{background:#0773c4}
.q{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 16px}
.q a{display:inline-block;padding:5px 12px;background:#dfe6e9;border-radius:20px;font-size:13px;color:#2d3436;text-decoration:none;cursor:pointer;transition:.15s}
.q a:hover{background:#b2bec3}
#st{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0;align-items:center}
#st a{padding:4px 10px;border-radius:14px;font-size:12px;background:#e8f4fd;color:#0984e3;text-decoration:none;cursor:pointer}
#st a:hover{background:#d0ecfc}
#ld{display:none;text-align:center;padding:40px;color:#636e72;font-size:15px}
.notice{background:#fef3e0;border:1px solid #f0c040;border-radius:8px;padding:8px 14px;font-size:13px;margin-bottom:14px;color:#7a5800}
#rs{min-height:100px}
.r{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #eee;transition:.15s}
.r:hover{border-color:#dfe6e9}
.r h2{font-size:15px;color:#0984e3;margin:0 0 3px}
.r .l{font-size:12px;color:#636e72;margin-bottom:4px}
.r .m{font-size:13px;color:#555;line-height:1.65;padding:6px 0 6px 10px;border-left:3px solid #dfe6e9;margin:6px 0}
.r .m span{background:#fff3cd;padding:0 2px;border-radius:2px}
.r .p{display:flex;flex-wrap:wrap;gap:4px;margin:3px 0}

.r .t{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.r .t span{font-size:11px;padding:1px 7px;border-radius:4px;background:#f0f0f0;color:#636e72}
#ft{font-size:12px;color:#b2bec3;text-align:center;margin-top:20px;padding:12px}
@media(prefers-color-scheme:dark){body{background:#1a1a2e;color:#e0e0e0}.r{background:#16213e;border-color:#2a2a4a}.r:hover{border-color:#3a3a5a}.s input{background:#16213e;border-color:#2a2a4a;color:#e0e0e0}.q a{background:#2a2a4a;color:#b0b0b0}.q a:hover{background:#3a3a5a}.r .m{border-color:#2a2a4a}#st a{background:#1a2a3e;color:#5aa3e6}}
</style>
</head>
<body>

<div class="header">
  <h1>📚 机械设计手册 <span>成大先 · 5卷8512页</span></h1>
  <div class="links">
    <a href="https://github.com/nasplycc/mechanical-design-handbook" target="_blank">GitHub ⬀</a>
    <a href="https://github.com/nasplycc/mechanical-design-handbook/issues/new" target="_blank">反馈 ⬀</a>
  </div>
</div>

<div class="s">
  <input id="q" placeholder="如：齿轮齿条 / 45号钢热处理 / 深沟球轴承 / 液压系统" onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">查询</button>
</div>

<div class="q">
  <a onclick="setQ('齿轮齿条机构')">⚙️ 齿轮齿条</a>
  <a onclick="setQ('深沟球轴承选型')">🔧 轴承</a>
  <a onclick="setQ('45号钢调质处理')">🔩 45号钢</a>
  <a onclick="setQ('V带传动设计')">⛓️ V带</a>
  <a onclick="setQ('液压回路系统')">💧 液压</a>
  <a onclick="setQ('压缩弹簧设计')">🌀 弹簧</a>
  <a onclick="setQ('公差配合')">📏 公差</a>
  <a onclick="setQ('焊接结构设计')">🔥 焊接</a>
</div>

<div id="st"></div>

<div class="notice">
  📖 页码为原手册的篇-页号（如 15-625 = 第15篇第625页），请在《机械设计手册》第六版对应卷册中查阅
</div>

<div id="ld">🔍 加载索引中...</div>
<div id="rs">
  <p style="text-align:center;color:#636e72;padding:60px 20px;line-height:2">
    🔎 输入关键词搜索<br>
    <span style="font-size:13px;color:#b2bec3">支持中英文、短语、材料牌号</span>
  </p>
</div>

<div id="ft"></div>

<script>
const SEARCH_URL = "https://raw.githubusercontent.com/nasplycc/mechanical-design-handbook/gh-pages/static_search.json";
let allFiles = [];

fetch(SEARCH_URL + "?t=" + Date.now())
  .then(r => { if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => {
    allFiles = d.index;
    document.getElementById("ld").style.display = "none";
    document.getElementById("rs").innerHTML = '<p style="text-align:center;color:#636e72;padding:40px">🔎 输入关键词搜索 · 共 <strong>' + allFiles.length + '</strong> 个知识库文件</p>';
    renderSceneTags();
    // URL参数自动搜索
    const urlQ = new URLSearchParams(window.location.search).get("q");
    if (urlQ) {
      document.getElementById("q").value = urlQ;
      dos(urlQ);
      // 替换URL，去掉?q=，避免刷新重复搜索
      window.history.replaceState({}, "", "./");
    }
  })
  .catch(e => {
    document.getElementById("ld").style.display = "none";
    document.getElementById("rs").innerHTML = '<p style="text-align:center;color:#e74c3c;padding:40px">❌ 索引加载失败，请刷新重试</p>';
  });

const SCENES = ["传动","齿轮","轴承","液压","气压","材料","弹簧","螺纹","键","润滑","电机","振动","公差","焊接"];
function renderSceneTags() {
  document.getElementById("st").innerHTML = SCENES.map(s => '<a onclick="setQ(\''+s+'\')">#'+s+'</a>').join(" ");
}

function tokenize(text) {
  const words = new Set();
  const cn = text.match(/[\u4e00-\u9fff]/g) || [];
  for (const c of cn) words.add(c);
  for (let i = 0; i < cn.length - 1; i++) words.add(cn[i] + cn[i+1]);
  for (let i = 0; i < cn.length - 2; i++) words.add(cn[i] + cn[i+1] + cn[i+2]);
  const en = text.match(/[a-zA-Z0-9.+\-/%°#≤≥×±→℃]+/g) || [];
  for (const w of en) if (w.length >= 2) words.add(w);
  return [...words];
}

function bm25(query, topK) {
  if (!allFiles.length) return [];
  const qTokens = tokenize(query);
  if (!qTokens.length) return [];
  if (!bm25._idf) {
    const N = allFiles.length;
    const df = {};
    for (let i = 0; i < N; i++) {
      const doc = allFiles[i];
      const idxText = [].concat(doc.h?doc.h.map(h=>h.t):[], doc.t||[], doc.kw||[]).join(" ");
      const seen = new Set(tokenize(idxText));
      for (const t of seen) df[t] = (df[t]||0)+1;
    }
    const idf = {};
    for (const t in df) idf[t] = Math.log10(1 + (N - df[t] + 0.5) / (df[t] + 0.5));
    bm25._idf = idf;
  }
  const idf = bm25._idf;
  const k1=1.2, b=0.75;
  let avgdl = 0;
  const lens=[], terms=[];
  for (let i=0; i<allFiles.length; i++) {
    const doc = allFiles[i];
    const txt = [].concat(doc.h?doc.h.map(h=>h.t):[], doc.s?doc.s.slice(0,3):[], doc.t||[], doc.kw||[]).join(" ");
    const t = tokenize(txt);
    lens.push(t.length); avgdl+=t.length;
    const c={}; for(const w of t) c[w]=(c[w]||0)+1;
    terms.push(c);
  }
  avgdl=avgdl/allFiles.length;
  const scores = new Array(allFiles.length).fill(0);
  let used=0;
  for (const qt of qTokens) {
    if (!(qt in idf)) continue;
    used++;
    for (let i=0; i<allFiles.length; i++) {
      const tf = terms[i][qt]||0;
      if (tf===0) continue;
      scores[i] += idf[qt] * (tf*(k1+1)) / (tf + k1*(1-b+b*lens[i]/avgdl));
    }
  }
  if (used===0) return [];
  return scores.map((s,i)=>({i,s})).filter(x=>x.s>=0.01).sort((a,b)=>b.s-a.s).slice(0,topK);
}

function setQ(q){document.getElementById("q").value=q;go();}

function go(){
  const q = document.getElementById("q").value.trim();
  if (!q) return;
  const results = bm25(q, 10);
  if (!results.length) {
    document.getElementById("rs").innerHTML = '<p style="text-align:center;color:#636e72;padding:40px">😕 未找到相关结果</p>';
    document.getElementById("ft").textContent = "🔍 "+q+" · 0 条";
    return;
  }
  let h = "";
  for (const r of results) {
    const doc = allFiles[r.i];
    const loc = [doc.v,doc.p,doc.pn].filter(Boolean).join(" ");
    const snippets = (doc.s||[]).slice(0,3).map(s => {
      const hl = s;
      return hl;
    }).join("<br>");
    const pages = doc.sr ? '<span style="background:#e8f4fd;padding:2px 10px;border-radius:4px;font-size:12px;color:#636e72;display:inline-block">📖 '+doc.sr+' 范围</span>' : '';
    const tags = (doc.t||[]).map(t => '<span>#'+t+'</span>').join("");
    h += '<div class="r"><h2>📁 <a href="view.html?file='+encodeURIComponent(doc.f)+'&q='+encodeURIComponent(q)+'" style="color:#0984e3;text-decoration:none">'+doc.f+'</a> <a href="view.html?file='+encodeURIComponent(doc.f)+'&q='+encodeURIComponent(q)+'" style="font-size:11px;color:#636e72;text-decoration:none;vertical-align:super">📖</a></h2><div class="l">📍 '+loc+'</div>'+
      (pages?'<div class="p">'+pages+'</div>':'')+
      (snippets?'<div class="m">'+snippets+'</div>':'')+
      (pages?'<div class="p">'+pages+'</div>':'')+
      (tags?'<div class="t">'+tags+'</div>':'')+'</div>';
  }
  document.getElementById("rs").innerHTML = h;
  document.getElementById("ft").textContent = "🔍 "+q+" · "+results.length+" 条结果";
}
</script>
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" 
  style="display:none;position:fixed;bottom:30px;right:30px;width:44px;height:44px;
  background:#0984e3;color:#fff;border:none;border-radius:50%;font-size:22px;
  cursor:pointer;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,0.2);
  transition:opacity 0.3s;opacity:0.85">⬆</button>
<script>
window.addEventListener('scroll',function(){
  document.getElementById('topBtn').style.display=window.scrollY>300?'block':'none';
});
</script>
</body>
</html>
